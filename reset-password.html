<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password - The Music Makeover</title>
  <link rel="icon" href="media/music-makeover-logo.png" type="image/png">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/crm.css">
</head>

<body class="auth-body">
  <main class="auth-shell">
    <section class="auth-card" aria-labelledby="reset-heading">
      <img class="auth-logo" src="media/music-makeover-logo.png" alt="The Music Makeover">
      <h1 id="reset-heading">Reset Password</h1>
      <div id="reset-status" class="status-message" role="status" aria-live="polite"></div>
      <form id="reset-password-form" class="auth-form">
        <div class="crm-field">
          <label for="new-password">New Password</label>
          <input id="new-password" name="password" type="password" autocomplete="new-password" minlength="8" placeholder="New Password" required>
        </div>
        <button class="auth-submit" type="submit">Reset Password</button>
      </form>
      <a class="auth-policy" href="admin-login.html">Back to admin login</a>
    </section>
  </main>

  <script src="assets/reset-password.js"></script>
</body>

</html>
